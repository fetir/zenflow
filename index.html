<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>ZenFlow 療癒白噪音</title><style>:root{--bg:#0f1026;--card:rgba(255,255,255,.06);--gold:#ffd76a;--mint:#74f0c3;--danger:#ff8d8d;--muted:rgba(255,255,255,.66);--soft:rgba(255,255,255,.45)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}html,body{background:radial-gradient(circle at top,rgba(116,240,195,.08),transparent 28%),linear-gradient(180deg,#101126,#17193a 50%,#11142c);color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}button{border:none;background:none;color:inherit;cursor:pointer;font:inherit}.app{max-width:430px;margin:0 auto;padding:16px 16px 120px}.hero{padding:20px;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.08);margin-bottom:18px}.hero h1{font-size:32px;letter-spacing:-.04em;margin:10px 0 6px}.hero p{color:var(--muted);font-size:14px;line-height:1.7}.hero-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.btn{min-height:48px;padding:0 16px;border-radius:16px;font-weight:700}.btn-primary{background:linear-gradient(135deg,#ffe8a1,#ffc94b);color:#171821}.btn-secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}.kofi-btn{width:100%;min-height:52px;border-radius:18px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;font-size:15px;font-weight:700;margin-top:12px;border:none}.sec-head{display:flex;align-items:end;justify-content:space-between;margin-bottom:12px}.sec-head h2{font-size:18px;letter-spacing:-.02em}.sec-head p{color:var(--soft);font-size:12px}.section{margin-bottom:16px}.chips{display:flex;gap:10px;overflow:auto;padding-bottom:4px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.mood-chip{flex:0 0 auto;min-width:72px;padding:12px 12px 10px;border-radius:18px;background:var(--card);border:1px solid transparent;text-align:center}.mood-chip.on{background:rgba(255,215,106,.12);border-color:rgba(255,215,106,.5)}.mood-chip .e{display:block;font-size:22px;margin-bottom:4px}.mood-chip .l{display:block;font-size:12px;color:var(--muted)}.sound-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.sc{padding:16px 14px;border-radius:22px;background:var(--card);border:1px solid transparent;text-align:left;min-height:148px}.sc.on{background:rgba(255,215,106,.1);border-color:rgba(255,215,106,.5)}.si{display:block;font-size:30px;margin-bottom:10px}.sn{display:block;font-size:15px;font-weight:700;margin-bottom:6px}.sd{display:block;font-size:12px;color:var(--soft);line-height:1.55;min-height:38px}.ss{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--muted)}.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22)}.sc.on .dot{background:var(--mint);box-shadow:0 0 10px rgba(116,240,195,.7)}.mini{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(calc(100% - 24px),406px);padding:12px;border-radius:22px;background:rgba(14,16,36,.92);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.1);box-shadow:0 18px 40px rgba(0,0,0,.35);z-index:20}.mini-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.mini-title{font-size:13px;font-weight:700}.mini-sub{font-size:12px;color:var(--muted);margin-top:2px}.mini-stop{min-width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--danger);font-weight:800}.mini-acts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tool-btn{min-height:42px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:700;color:var(--muted)}.vol-section{margin-bottom:16px}.vr{background:rgba(255,255,255,.07);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}.vi{font-size:18px;width:24px;text-align:center}.vn{font-size:12px;flex:1}input[type=range]{flex:2;-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.2);outline:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer}.breath-card{background:rgba(255,255,255,.07);border-radius:20px;padding:20px;margin-bottom:16px;text-align:center}.bcirc{width:120px;height:120px;border-radius:50%;margin:16px auto;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(99,102,241,.2);border:3px solid rgba(99,102,241,.4);transition:all .5s}.bcirc.inhale{transform:scale(1.3);background:rgba(74,222,128,.2);border-color:#4ade80}.bcirc.hold{transform:scale(1.3);background:rgba(251,146,60,.2);border-color:#fb923c}.bcirc.exhale{transform:scale(.85);background:rgba(96,165,250,.2);border-color:#60a5fa}.bt{font-size:14px;font-weight:600}.bn{font-size:32px;font-weight:200}.bbtn{background:white;color:#1a1a2e;border:none;border-radius:30px;padding:10px 36px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}.timer-card{background:rgba(255,255,255,.07);border-radius:20px;padding:20px;margin-bottom:16px}.timer-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tb2{background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:12px;padding:10px;color:white;font-size:13px;cursor:pointer}.tb2.on{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.15)}.td{text-align:center;font-size:40px;font-weight:200;margin:14px 0 6px;letter-spacing:3px;display:none}.td.show{display:block}.tcan{display:none;width:100%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:12px;padding:10px;font-size:13px;cursor:pointer;margin-top:6px}.tcan.show{display:block}.sa{width:100%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:rgba(239,68,68,.75);border-radius:16px;padding:14px;font-size:15px;cursor:pointer}@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}.sc.on .si{animation:pulse 2s infinite}</style></head><body><div class="app"><div class="hero"><div style="display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--muted);font-size:12px;border:1px solid rgba(255,255,255,.08)">🌙 ZenFlow · 療癒白噪音</div><h1>放鬆，從現在<br>開始。</h1><p>依照你的情緒，推薦最適合的療癒音景，幫助你減少焦慮、平靜內心。</p><div class="hero-actions"><button class="btn btn-primary" onclick="playAll()">立即放鬆</button><button class="btn btn-secondary" onclick="startTimer(45)">45分助眠</button></div><button class="kofi-btn" onclick="window.open('https://ko-fi.com/zenflow','_blank')">☕ 請比利喝杯咖啡，支持 ZenFlow 繼續免費</button></div><div class="section"><div class="sec-head"><h2>你現在的心情</h2><p>選心情看推薦</p></div><div class="chips"><button class="mood-chip on" onclick="selMood(this,'stressed')"><span class="e">😤</span><span class="l">壓力</span></button><button class="mood-chip" onclick="selMood(this,'anxious')"><span class="e">😰</span><span class="l">焦慮</span></button><button class="mood-chip" onclick="selMood(this,'angry')"><span class="e">😡</span><span class="l">憤怒</span></button><button class="mood-chip" onclick="selMood(this,'sad')"><span class="e">😔</span><span class="l">悲傷</span></button><button class="mood-chip" onclick="selMood(this,'tired')"><span class="e">😴</span><span class="l">疲憊</span></button></div></div><div class="section"><div class="sec-head"><h2>音景選擇</h2><p>可混搭播放</p></div><div class="sound-grid"><button class="sc" id="c-rain" onclick="tS('rain')"><span class="si">🌧</span><span class="sn">雨聲</span><span class="sd">穩定細雨，撫平焦慮雜念</span><span class="ss"><span class="dot"></span>點擊播放</span></button><button class="sc" id="c-water" onclick="tS('water')"><span class="si">💧</span><span class="sn">流水聲</span><span class="sd">柔和水流，釋放壓力</span><span class="ss"><span class="dot"></span>點擊播放</span></button><button class="sc" id="c-f432" onclick="tS('f432')"><span class="si">🎵</span><span class="sn">432Hz</span><span class="sd">雙耳節拍，Alpha腦波放鬆</span><span class="ss"><span class="dot"></span>點擊播放</span></button><button class="sc" id="c-f528" onclick="tS('f528')"><span class="si">✨</span><span class="sn">528Hz</span><span class="sd">愛之頻率，情緒修復</span><span class="ss"><span class="dot"></span>點擊播放</span></button><button class="sc" id="c-wind" onclick="tS('wind')"><span class="si">🌾</span><span class="sn">稻田風聲</span><span class="sd">東南亞自然氛圍</span><span class="ss"><span class="dot"></span>點擊播放</span></button><button class="sc" id="c-ocean" onclick="tS('ocean')"><span class="si">🌊</span><span class="sn">海浪聲</span><span class="sd">規律拍岸，慢慢沉靜</span><span class="ss"><span class="dot"></span>點擊播放</span></button></div></div><div class="section"><div class="sec-head"><h2>音量調整</h2></div><div class="vol-section"><div class="vr"><span class="vi">🌧</span><span class="vn">雨聲</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('rain',this.value)"></div><div class="vr"><span class="vi">💧</span><span class="vn">流水</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('water',this.value)"></div><div class="vr"><span class="vi">🎵</span><span class="vn">頻率音</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('f432',this.value);sV('f528',this.value)"></div><div class="vr"><span class="vi">🌿</span><span class="vn">風/海浪</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('wind',this.value);sV('ocean',this.value)"></div></div></div><div class="section"><div class="sec-head"><h2>4-7-8 呼吸引導</h2></div><div class="breath-card"><div style="font-size:12px;color:var(--muted)">吸氣4秒·憋氣7秒·吐氣8秒</div><div class="bcirc" id="bC"><span class="bt" id="bT">準備好了嗎？</span><span class="bn" id="bN"></span></div><button class="bbtn" id="bB" onclick="tB()">開始</button></div></div><div class="section"><div class="sec-head"><h2>睡眠計時器</h2></div><div class="timer-card"><div class="timer-opts"><button class="tb2" onclick="startTimer(15)">15分</button><button class="tb2" onclick="startTimer(30)">30分</button><button class="tb2" onclick="startTimer(45)">45分</button><button class="tb2" onclick="startTimer(60)">60分</button><button class="tb2" onclick="startTimer(90)">90分</button><button class="tb2" onclick="startTimer(120)">2小時</button></div><div class="td" id="tD">00:00</div><button class="tcan" id="tC" onclick="cT()">✕ 取消計時器</button></div></div><button class="sa" onclick="stpAll()">⏹ 全部停止</button><div style="text-align:center;padding:20px 0 8px"><button onclick="window.open('https://ko-fi.com/zenflow','_blank')" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer">☕ 喜歡 ZenFlow？支持比利繼續做下去</button></div></div><div class="mini"><div class="mini-top"><div><div class="mini-title" id="mTitle">ZenFlow 準備中...</div><div class="mini-sub" id="mSub">選擇音景開始放鬆</div></div><button class="mini-stop" onclick="stpAll()">⏹</button></div><div class="mini-acts"><button class="tool-btn" onclick="window.open('https://ko-fi.com/zenflow','_blank')">☕ 支持</button><button class="tool-btn" onclick="startTimer(45)">⏱ 計時</button><button class="tool-btn" onclick="tB()">🫁 呼吸</button><button class="tool-btn" onclick="stpAll()">⏹ 停止</button></div></div><script>const AC=new(window.AudioContext||window.webkitAudioContext)();const mg=AC.createGain();mg.connect(AC.destination);const ns={},gs={},vs={rain:.5,water:.5,f432:.5,f528:.5,wind:.5,ocean:.5};function mR(sr){const n=sr*5,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let b0=0,b1=0,b2=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;d[i]=(b0+b1+b2+w*.5362)*.11;}}return b;}function mW(sr){const n=sr*5,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let l=0;for(let i=0;i<n;i++){l=l*.97+(Math.random()*.4-.2)*.03;d[i]=l*4;}}return b;}function mF(sr,fL,fR){const n=sr*6,b=AC.createBuffer(2,n,sr);const L=b.getChannelData(0),R=b.getChannelData(1);for(let i=0;i<n;i++){const t=i/sr;L[i]=Math.sin(2*Math.PI*fL*t)*.15;R[i]=Math.sin(2*Math.PI*fR*t)*.15;}return b;}function mWn(sr){const n=sr*5,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let p=0;for(let i=0;i<n;i++){p+=Math.random()*.002+.001;d[i]=Math.sin(p)*(Math.random()*.15+.05);}}return b;}function mO(sr){const n=sr*8,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let bv=0;for(let i=0;i<n;i++){const t=i/sr,w=Math.sin(t*.25)*.5+.5,nv=Math.random()*.2-.1;bv=bv*.97+nv*.03;d[i]=bv*w*5;}}return b;}const G={rain:mR,water:mW,f432:sr=>mF(sr,432,440),f528:sr=>mF(sr,528,536),wind:mWn,ocean:mO};function pS(t){AC.resume();const buf=G[t](AC.sampleRate),src=AC.createBufferSource();src.buffer=buf;src.loop=true;const g=AC.createGain();g.gain.value=vs[t];src.connect(g);g.connect(mg);src.start();ns[t]=src;gs[t]=g;}function stpS(t){if(ns[t]){ns[t].stop();ns[t]=null;gs[t]=null;}}function tS(t){const c=document.getElementById('c-'+t),s=c.querySelector('.ss');if(ns[t]){stpS(t);c.classList.remove('on');s.innerHTML='<span class="dot"></span>點擊播放';}else{pS(t);c.classList.add('on');s.innerHTML='<span class="dot"></span>播放中';}updMini();}function sV(t,v){vs[t]=+v;if(gs[t])gs[t].gain.value=+v;}function stpAll(){Object.keys(ns).forEach(t=>{if(ns[t]){stpS(t);const c=document.getElementById('c-'+t);if(c){c.classList.remove('on');c.querySelector('.ss').innerHTML='<span class="dot"></span>點擊播放';}}});cT();document.getElementById('mTitle').textContent='ZenFlow 準備中...';document.getElementById('mSub').textContent='選擇音景開始放鬆';}function playAll(){['rain','f432'].forEach(t=>{if(!ns[t]){pS(t);const c=document.getElementById('c-'+t);c.classList.add('on');c.querySelector('.ss').innerHTML='<span class="dot"></span>播放中';}});updMini();}function updMini(){const playing=Object.keys(ns).filter(t=>ns[t]);if(playing.length>0){document.getElementById('mTitle').textContent='正在播放：'+playing.length+'種音景';document.getElementById('mSub').textContent='點擊音景卡片可停止個別音源';}else{document.getElementById('mTitle').textContent='ZenFlow 準備中...';document.getElementById('mSub').textContent='選擇音景開始放鬆';}}function selMood(el,mood){document.querySelectorAll('.mood-chip').forEach(b=>b.classList.remove('on'));el.classList.add('on');const rec={stressed:'wind',anxious:'f432',angry:'rain',sad:'f528',tired:'ocean'};const t=rec[mood];if(t&&!ns[t]){pS(t);const c=document.getElementById('c-'+t);c.classList.add('on');c.querySelector('.ss').innerHTML='<span class="dot"></span>播放中';updMini();}}let bA=false,bP=0,bTm=null,bC2=0;const ph=[{t:'吸氣...',s:4,c:'inhale'},{t:'憋住...',s:7,c:'hold'},{t:'慢慢吐氣...',s:8,c:'exhale'}];function tB(){if(bA){clearInterval(bTm);bA=false;document.getElementById('bB').textContent='開始';document.getElementById('bT').textContent='準備好了嗎？';document.getElementById('bN').textContent='';document.getElementById('bC').className='bcirc';}else{bA=true;bP=0;document.getElementById('bB').textContent='停止';rP();}}function rP(){const p=ph[bP%3];bC2=p.s;document.getElementById('bT').textContent=p.t;document.getElementById('bN').textContent=bC2;document.getElementById('bC').className='bcirc '+p.c;clearInterval(bTm);bTm=setInterval(()=>{bC2--;document.getElementById('bN').textContent=bC2;if(bC2<=0){clearInterval(bTm);bP++;if(bA)rP();}},1000);}let tI=null,tS2=0;function startTimer(m){cT();tS2=m*60;document.getElementById('tD').classList.add('show');document.getElementById('tC').classList.add('show');uT();tI=setInterval(()=>{tS2--;uT();if(tS2<=60&&tS2>0)mg.gain.setTargetAtTime(tS2/60,AC.currentTime,1);if(tS2<=0){stpAll();mg.gain.value=1;}},1000);}function uT(){const m=Math.floor(tS2/60),s=tS2%60;document.getElementById('tD').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}function cT(){clearInterval(tI);tI=null;mg.gain.value=1;document.getElementById('tD').classList.remove('show');document.getElementById('tC').classList.remove('show');}</script></body></html>
