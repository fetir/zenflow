<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="apple-mobile-web-app-capable" content="yes"><title>ZenFlow 療癒白噪音</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:white}.container{max-width:480px;margin:0 auto;padding:20px 16px 60px}.header{text-align:center;padding:40px 0 28px}.header h1{font-size:30px;font-weight:700}.header p{color:rgba(255,255,255,.5);font-size:13px;margin-top:6px}.sec{font-size:12px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}.egrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px}.eb{background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:14px;padding:10px 4px;cursor:pointer;text-align:center}.eb.on{border-color:#FFD700;background:rgba(255,215,0,.15)}.eb span{display:block}.eb .e{font-size:22px}.eb .l{font-size:10px;color:rgba(255,255,255,.55);margin-top:3px}.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}.sc{background:rgba(255,255,255,.07);border:2px solid transparent;border-radius:20px;padding:18px 14px;cursor:pointer;transition:all .3s}.sc.on{border-color:rgba(255,215,0,.6);background:rgba(255,215,0,.1)}.sc .si{font-size:34px;display:block;margin-bottom:8px}.sc.on .si{animation:pulse 2s infinite}.sc .sn{font-size:14px;font-weight:600;margin-bottom:3px}.sc .sd{font-size:11px;color:rgba(255,255,255,.5)}.ss{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:10px}.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3)}.sc.on .dot{background:#4ade80;box-shadow:0 0 6px #4ade80}.sc.on .st{color:#4ade80}.vs{margin-bottom:24px}.vr{background:rgba(255,255,255,.07);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}.vi{font-size:18px;width:24px;text-align:center}.vn{font-size:12px;flex:1}input[type=range]{flex:2;-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.2);outline:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#FFD700;cursor:pointer}.bc{background:rgba(255,255,255,.07);border-radius:20px;padding:20px;margin-bottom:24px;text-align:center}.bsub{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:4px}.bcirc{width:120px;height:120px;border-radius:50%;margin:18px auto;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(99,102,241,.2);border:3px solid rgba(99,102,241,.4);transition:all .5s;cursor:pointer}.bcirc.inhale{transform:scale(1.3);background:rgba(74,222,128,.2);border-color:#4ade80}.bcirc.hold{transform:scale(1.3);background:rgba(251,146,60,.2);border-color:#fb923c}.bcirc.exhale{transform:scale(.85);background:rgba(96,165,250,.2);border-color:#60a5fa}.bt{font-size:14px;font-weight:600}.bc2{font-size:32px;font-weight:200}.bbtn{background:white;color:#1a1a2e;border:none;border-radius:30px;padding:10px 36px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}.tc{background:rgba(255,255,255,.07);border-radius:20px;padding:20px;margin-bottom:24px}.to{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tb{background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:12px;padding:10px;color:white;font-size:13px;cursor:pointer}.td{text-align:center;font-size:40px;font-weight:200;margin:14px 0 6px;letter-spacing:3px;display:none}.td.show{display:block}.tcan{display:none;width:100%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:12px;padding:10px;font-size:13px;cursor:pointer;margin-top:6px}.tcan.show{display:block}.sa{width:100%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:rgba(239,68,68,.75);border-radius:16px;padding:14px;font-size:15px;cursor:pointer}@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}</style></head><body><div class="container"><div class="header"><h1>🌙 ZenFlow</h1><p>療癒白噪音 · 為你量身定制</p></div><div class="sec">你現在的心情</div><div class="egrid"><div class="eb on" data-e="stressed" onclick="sE(this)"><span class="e">😤</span><span class="l">壓力</span></div><div class="eb" data-e="anxious" onclick="sE(this)"><span class="e">😰</span><span class="l">焦慮</span></div><div class="eb" data-e="angry" onclick="sE(this)"><span class="e">😡</span><span class="l">憤怒</span></div><div class="eb" data-e="sad" onclick="sE(this)"><span class="e">😔</span><span class="l">悲傷</span></div><div class="eb" data-e="tired" onclick="sE(this)"><span class="e">😴</span><span class="l">疲憊</span></div></div><div class="sec">音景選擇</div><div class="sgrid"><div class="sc" id="c-rain" onclick="tS('rain')"><span class="si">🌧</span><div class="sn">雨聲</div><div class="sd">粉紅雜訊，撫平焦慮</div><div class="ss"><div class="dot"></div><span class="st">點擊播放</span></div></div><div class="sc" id="c-water" onclick="tS('water')"><span class="si">💧</span><div class="sn">流水聲</div><div class="sd">輕柔水流，釋放壓力</div><div class="ss"><div class="dot"></div><span class="st">點擊播放</span></div></div><div class="sc" id="c-f432" onclick="tS('f432')"><span class="si">🎵</span><div class="sn">432Hz</div><div class="sd">雙耳節拍，Alpha腦波</div><div class="ss"><div class="dot"></div><span class="st">點擊播放</span></div></div><div class="sc" id="c-f528" onclick="tS('f528')"><span class="si">✨</span><div class="sn">528Hz</div><div class="sd">愛之頻率，情緒修復</div><div class="ss"><div class="dot"></div><span class="st">點擊播放</span></div></div><div class="sc" id="c-wind" onclick="tS('wind')"><span class="si">🌾</span><div class="sn">稻田風聲</div><div class="sd">東南亞自然氛圍</div><div class="ss"><div class="dot"></div><span class="st">點擊播放</span></div></div><div class="sc" id="c-ocean" onclick="tS('ocean')"><span class="si">🌊</span><div class="sn">海浪聲</div><div class="sd">規律波浪，深度放鬆</div><div class="ss"><div class="dot"></div><span class="st">點擊播放</span></div></div></div><div class="sec">音量調整</div><div class="vs"><div class="vr"><span class="vi">🌧</span><span class="vn">雨聲</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('rain',this.value)"></div><div class="vr"><span class="vi">💧</span><span class="vn">流水</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('water',this.value)"></div><div class="vr"><span class="vi">🎵</span><span class="vn">頻率音</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('f432',this.value);sV('f528',this.value)"></div><div class="vr"><span class="vi">🌿</span><span class="vn">風/海浪</span><input type="range" min="0" max="1" step="0.01" value="0.5" oninput="sV('wind',this.value);sV('ocean',this.value)"></div></div><div class="sec">4-7-8 呼吸引導</div><div class="bc"><div class="bsub">吸氣4秒·憋氣7秒·吐氣8秒</div><div class="bcirc" id="bC"><span class="bt" id="bT">準備好了嗎？</span><span class="bc2" id="bN"></span></div><button class="bbtn" id="bB" onclick="tB()">開始</button></div><div class="sec">睡眠計時器</div><div class="tc"><div class="to"><button class="tb" onclick="stT(15)">15分鐘</button><button class="tb" onclick="stT(30)">30分鐘</button><button class="tb" onclick="stT(45)">45分鐘</button><button class="tb" onclick="stT(60)">60分鐘</button><button class="tb" onclick="stT(90)">90分鐘</button><button class="tb" onclick="stT(120)">2小時</button></div><div class="td" id="tD">00:00</div><button class="tcan" id="tC" onclick="cT()">✕ 取消計時器</button></div><button class="sa" onclick="stpAll()">⏹ 全部停止</button></div><script>const AC=new(window.AudioContext||window.webkitAudioContext)();const mg=AC.createGain();mg.connect(AC.destination);const ns={},gs={},vs={rain:.5,water:.5,f432:.5,f528:.5,wind:.5,ocean:.5};function mR(sr){const n=sr*5,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let b0=0,b1=0,b2=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;d[i]=(b0+b1+b2+w*.5362)*.11;}}return b;}function mW(sr){const n=sr*5,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let l=0;for(let i=0;i<n;i++){l=l*.97+(Math.random()*.4-.2)*.03;d[i]=l*4;}}return b;}function mF(sr,fL,fR){const n=sr*6,b=AC.createBuffer(2,n,sr);const L=b.getChannelData(0),R=b.getChannelData(1);for(let i=0;i<n;i++){const t=i/sr;L[i]=Math.sin(2*Math.PI*fL*t)*.15;R[i]=Math.sin(2*Math.PI*fR*t)*.15;}return b;}function mWn(sr){const n=sr*5,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let p=0;for(let i=0;i<n;i++){p+=Math.random()*.002+.001;d[i]=Math.sin(p)*(Math.random()*.15+.05);}}return b;}function mO(sr){const n=sr*8,b=AC.createBuffer(2,n,sr);for(let c=0;c<2;c++){const d=b.getChannelData(c);let bv=0;for(let i=0;i<n;i++){const t=i/sr,w=Math.sin(t*.25)*.5+.5,nv=Math.random()*.2-.1;bv=bv*.97+nv*.03;d[i]=bv*w*5;}}return b;}const G={rain:mR,water:mW,f432:sr=>mF(sr,432,440),f528:sr=>mF(sr,528,536),wind:mWn,ocean:mO};function pS(t){AC.resume();const buf=G[t](AC.sampleRate),src=AC.createBufferSource();src.buffer=buf;src.loop=true;const g=AC.createGain();g.gain.value=vs[t];src.connect(g);g.connect(mg);src.start();ns[t]=src;gs[t]=g;}function stpS(t){if(ns[t]){ns[t].stop();ns[t]=null;gs[t]=null;}}function tS(t){const c=document.getElementById('c-'+t),s=c.querySelector('.st');if(ns[t]){stpS(t);c.classList.remove('on');s.textContent='點擊播放';}else{pS(t);c.classList.add('on');s.textContent='播放中';}}function sV(t,v){vs[t]=+v;if(gs[t])gs[t].gain.value=+v;}function stpAll(){Object.keys(ns).forEach(t=>{if(ns[t]){stpS(t);const c=document.getElementById('c-'+t);if(c){c.classList.remove('on');c.querySelector('.st').textContent='點擊播放';}}});cT();}function sE(el){document.querySelectorAll('.eb').forEach(b=>b.classList.remove('on'));el.classList.add('on');}let bA=false,bP=0,bTm=null,bC=0;const ph=[{t:'吸氣...',s:4,c:'inhale'},{t:'憋住...',s:7,c:'hold'},{t:'慢慢吐氣...',s:8,c:'exhale'}];function tB(){if(bA){clearInterval(bTm);bA=false;document.getElementById('bB').textContent='開始';document.getElementById('bT').textContent='準備好了嗎？';document.getElementById('bN').textContent='';document.getElementById('bC').className='bcirc';}else{bA=true;bP=0;document.getElementById('bB').textContent='停止';rP();}}function rP(){const p=ph[bP%3];bC=p.s;document.getElementById('bT').textContent=p.t;document.getElementById('bN').textContent=bC;document.getElementById('bC').className='bcirc '+p.c;clearInterval(bTm);bTm=setInterval(()=>{bC--;document.getElementById('bN').textContent=bC;if(bC<=0){clearInterval(bTm);bP++;if(bA)rP();}},1000);}let tI=null,tS2=0;function stT(m){cT();tS2=m*60;document.getElementById('tD').classList.add('show');document.getElementById('tC').classList.add('show');uT();tI=setInterval(()=>{tS2--;uT();if(tS2<=60&&tS2>0)mg.gain.setTargetAtTime(tS2/60,AC.currentTime,1);if(tS2<=0){stpAll();mg.gain.value=1;}},1000);}function uT(){const m=Math.floor(tS2/60),s=tS2%60;document.getElementById('tD').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}function cT(){clearInterval(tI);tI=null;mg.gain.value=1;document.getElementById('tD').classList.remove('show');document.getElementById('tC').classList.remove('show');}</script></body></html>
